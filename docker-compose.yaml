services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm_app        # ← ganti
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    environment:
      - APP_ENV=local
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - crm_network                # ← ganti

  nginx:
    image: nginx:alpine
    container_name: crm_nginx      # ← ganti
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - crm_network                # ← ganti

  mysql:
    image: mysql:8.0
    container_name: crm_mysql      # ← ganti
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm_network                # ← ganti

  redis:
    image: redis:alpine
    container_name: crm_redis      # ← ganti
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - crm_network                # ← ganti
  
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: crm_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    networks:
      - crm_network
    depends_on:
      - mysql

networks:
  crm_network:                     # ← ganti nama network
    driver: bridge

volumes:
  mysql-data: